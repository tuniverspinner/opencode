name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
inputs:
  cross-compile:
    description: "Pre-cache canary cross-compile binaries for Windows targets"
    required: false
    default: "false"
  cross-compile-version:
    description: "Bun semver used for Windows cross-compile cache keys"
    required: false
    default: ""
  install-flags:
    description: "Additional flags to pass to 'bun install'"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Get baseline download URL
      id: bun-url
      shell: bash
      run: |
        V=$(node -p "require('./package.json').packageManager.split('@')[1]")
        if [ "$RUNNER_OS" = "Windows" ]; then
          case "$RUNNER_ARCH" in
            X64)   ARTIFACT=bun-windows-x64-baseline.zip ;;
            ARM64) ARTIFACT=bun-windows-aarch64.zip ;;
          esac
          echo "url=https://github.com/oven-sh/bun/releases/download/canary/${ARTIFACT}" >> "$GITHUB_OUTPUT"
        elif [ "$RUNNER_ARCH" = "X64" ]; then
          case "$RUNNER_OS" in
            macOS) OS=darwin ;;
            Linux) OS=linux ;;
          esac
          echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-x64-baseline.zip" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: ${{ !steps.bun-url.outputs.url && 'package.json' || '' }}
        bun-download-url: ${{ steps.bun-url.outputs.url }}

    - name: Get cache directory
      id: cache
      shell: bash
      run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

    - name: Restore Bun dependencies
      id: bun-cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Pre-cache Windows canary cross-compile binaries
      if: inputs.cross-compile == 'true'
      shell: bash
      run: |
        if [ -z "${{ inputs.cross-compile-version }}" ]; then
          echo "cross-compile-version is required when cross-compile is true" >&2
          exit 1
        fi
        SEMVER="${{ inputs.cross-compile-version }}"
        CACHE_DIR="${{ steps.cache.outputs.dir }}"
        mkdir -p "$CACHE_DIR"
        TMP_DIR=$(mktemp -d)
        for TARGET in windows-aarch64 windows-x64 windows-x64-baseline; do
          DEST="$CACHE_DIR/bun-${TARGET}-v${SEMVER}"
          URL="https://github.com/oven-sh/bun/releases/download/canary/bun-${TARGET}.zip"
          echo "Downloading $TARGET from $URL"
          curl -sfL -o "$TMP_DIR/bun.zip" "$URL"
          unzip -qo "$TMP_DIR/bun.zip" -d "$TMP_DIR"
          mv "$TMP_DIR/bun-${TARGET}/bun.exe" "$DEST"
          chmod +x "$DEST"
          rm -rf "$TMP_DIR/bun-${TARGET}" "$TMP_DIR/bun.zip"
          echo "Cached: $DEST"
        done
        rm -rf "$TMP_DIR"

    - name: Install setuptools for distutils compatibility
      run: python3 -m pip install setuptools || pip install setuptools || true
      shell: bash

    - name: Install dependencies
      run: |
        # Workaround for patched peer variants
        # e.g. ./patches/ for standard-openapi
        # https://github.com/oven-sh/bun/issues/28147
        if [ "$RUNNER_OS" = "Windows" ]; then
          bun install --linker hoisted ${{ inputs.install-flags }}
        else
          bun install ${{ inputs.install-flags }}
        fi
      shell: bash

    - name: Save Bun dependencies
      if: steps.bun-cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
